services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      - redis

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_SOCKET_URL: http://localhost:4000
    ports:
      - "5173:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
